<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>swarmr</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      #perf {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 10;
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.35;
        color: #8fff8f;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(143, 255, 143, 0.25);
        border-radius: 4px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      #xpbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 7px;
        z-index: 11;
        background: rgba(0, 0, 0, 0.55);
        pointer-events: none;
        user-select: none;
      }
      #xpfill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #49b6ff, #9b6bff);
      }
      #level {
        position: fixed;
        top: 12px;
        right: 10px;
        z-index: 11;
        font-size: 14px;
        font-weight: bold;
        color: #bcd6ff;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        user-select: none;
      }
      #hud {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        pointer-events: none;
        user-select: none;
      }
      #hpbar {
        position: relative;
        width: 360px;
        height: 22px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        overflow: hidden;
      }
      #hpfill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        background: #2fbf5a;
      }
      #hptext {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 1px 2px #000;
      }
      #death {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #ff6b6b;
        pointer-events: none;
        user-select: none;
      }
      #death .title {
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 4px;
      }
      #death .hint {
        font-size: 16px;
        color: #cdd3df;
      }
      #upgrades {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: rgba(0, 0, 0, 0.72);
        pointer-events: auto;
        user-select: none;
      }
      .up-title {
        font-size: 26px;
        font-weight: bold;
        letter-spacing: 2px;
        color: #ffd86b;
        text-shadow: 0 1px 3px #000;
      }
      .up-row {
        display: flex;
        gap: 18px;
      }
      .up-card {
        width: 220px;
        min-height: 150px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 16px;
        background: #161a24;
        border: 2px solid #2a3142;
        border-radius: 10px;
        cursor: pointer;
        color: #e6ebf5;
        font-family: inherit;
        transition: border-color 0.1s, background 0.1s, transform 0.1s;
      }
      .up-card:hover {
        border-color: #9b6bff;
        background: #1d2433;
        transform: translateY(-3px);
      }
      .up-num {
        width: 26px;
        height: 26px;
        line-height: 26px;
        text-align: center;
        border-radius: 50%;
        background: #2a3142;
        color: #bcd6ff;
        font-size: 14px;
        font-weight: bold;
      }
      .up-name {
        font-size: 19px;
        font-weight: bold;
        color: #bcd6ff;
      }
      .up-desc {
        font-size: 13px;
        color: #aab2c5;
        text-align: center;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="perf"></div>
    <div id="xpbar"><div id="xpfill"></div></div>
    <div id="level">LV 1</div>
    <div id="hud">
      <div id="hpbar">
        <div id="hpfill"></div>
        <div id="hptext"></div>
      </div>
    </div>
    <div id="death">
      <div class="title">YOU DIED</div>
      <div class="hint">press R to restart</div>
    </div>
    <div id="upgrades"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
